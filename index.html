<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuscaLeilões — Leilões de veículos e imóveis</title>
<style>
  :root{
    --bg:#f5f6f8; --surface:#ffffff; --surface-2:#fafbfc; --line:#e6e8ec; --line-2:#eef0f3;
    --ink:#111726; --ink-2:#3d4657; --muted:#6b7482; --faint:#98a2b3;
    --brand:#1f47d6; --brand-ink:#173aad; --brand-soft:#edf1fe;
    --good:#0a7c4f; --good-soft:#e6f4ec; --warnc:#a9720a; --warn-soft:#fbf1de;
    --r:12px; --r-sm:8px; --sh:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.06);
    --sh-md:0 8px 24px rgba(16,24,40,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;font-size:14px;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none} button{font-family:inherit}
  svg{display:block}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}

  /* Header */
  header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .nav{display:flex;align-items:center;gap:28px;max-width:1280px;margin:0 auto;padding:0 24px;height:60px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;letter-spacing:-.02em;white-space:nowrap}
  .brand .mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--brand),#3b63e8);display:flex;align-items:center;justify-content:center;color:#fff}
  .tabs{display:flex;gap:2px;height:100%}
  .tab{position:relative;border:none;background:none;padding:0 4px;height:100%;display:flex;align-items:center;gap:7px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;margin:0 10px}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--brand)}
  .tab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--brand);border-radius:2px}
  .tab .cnt{font-size:11px;font-weight:700;background:var(--line-2);color:var(--ink-2);border-radius:20px;padding:1px 7px;min-width:20px;text-align:center}
  .tab.active .cnt{background:var(--brand-soft);color:var(--brand)}
  .status{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--ink-2);background:var(--surface);border:1px solid var(--line);padding:6px 12px;border-radius:20px;white-space:nowrap}
  .status .dot{width:7px;height:7px;border-radius:50%;background:var(--good)}

  .wrap{max-width:1280px;margin:0 auto;padding:24px}

  /* Search + filters */
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
  .searchpanel{padding:18px;margin-bottom:22px}
  .segrow{display:flex;gap:8px;margin-bottom:14px}
  .seg{border:1px solid var(--line);background:var(--surface);color:var(--muted);font-weight:600;font-size:13.5px;padding:8px 16px;border-radius:20px;cursor:pointer}
  .seg:hover{border-color:var(--faint)}
  .seg.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .searchbar{display:flex;gap:10px;align-items:stretch}
  .inp{flex:1;display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:0 14px}
  .inp:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .inp svg{color:var(--faint);flex-shrink:0}
  .inp input{flex:1;border:none;background:none;outline:none;font-size:15px;color:var(--ink);padding:12px 0}
  .gobtn{background:var(--brand);color:#fff;border:none;padding:0 26px;border-radius:var(--r-sm);font-weight:600;font-size:14px;cursor:pointer}
  .gobtn:hover{background:var(--brand-ink)}
  .chiprow{display:flex;gap:9px;flex-wrap:wrap;margin-top:16px}

  .dd{position:relative}
  .ddbtn{display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);font-weight:600;font-size:13.5px;padding:8px 13px;border-radius:var(--r-sm);cursor:pointer}
  .ddbtn:hover{border-color:var(--faint)}
  .ddbtn.has{background:var(--brand-soft);border-color:#c5d2fb;color:var(--brand-ink)}
  .ddbtn .car{color:var(--faint);transition:transform .18s}
  .dd.open .ddbtn .car{transform:rotate(180deg)}
  .ddbtn .pill{background:var(--brand);color:#fff;font-size:11px;border-radius:20px;padding:0 6px;font-weight:700;min-width:18px;text-align:center}
  .ddpanel{position:absolute;top:calc(100% + 8px);left:0;z-index:40;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-md);padding:12px;min-width:240px;display:none}
  .dd.open .ddpanel{display:block}
  .ddpanel .search{width:100%;border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px;font-size:13px;outline:none;margin-bottom:10px}
  .ddpanel .search:focus{border-color:var(--brand)}
  .optlist{max-height:240px;overflow:auto;display:flex;flex-direction:column;gap:1px}
  .opt{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r-sm);cursor:pointer;font-size:14px;color:var(--ink-2)}
  .opt:hover{background:var(--surface-2)}
  .opt input{width:16px;height:16px;accent-color:var(--brand);cursor:pointer}
  .ddfoot{display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--line-2)}
  .ddfoot button{border:none;background:none;font-weight:600;font-size:13px;cursor:pointer;color:var(--muted);padding:4px 2px}
  .ddfoot .apply{color:var(--brand)}
  .rangeinputs{display:flex;gap:8px;align-items:center}
  .rangeinputs input{width:100%;border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px;font-size:14px;outline:none}
  .rangeinputs input:focus{border-color:var(--brand)}

  /* Notices */
  .notice{display:flex;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;margin-bottom:20px;box-shadow:var(--sh);font-size:13px;color:var(--ink-2)}
  .notice .ic{color:var(--brand);flex-shrink:0;margin-top:1px}
  .notice.warn .ic{color:var(--warnc)}
  .notice b{color:var(--ink);font-weight:600}

  .rhead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
  .viewtitle{font-size:19px;font-weight:700;letter-spacing:-.01em}
  .count{font-size:13.5px;color:var(--muted)} .count b{color:var(--ink);font-weight:600}

  /* Grid + cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(276px,1fr));gap:20px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--sh);transition:box-shadow .18s,transform .18s;position:relative}
  .card:hover{box-shadow:var(--sh-md);transform:translateY(-2px)}
  .thumb{position:relative;aspect-ratio:16/10;background:var(--surface-2);overflow:hidden}
  .thumb .slide{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background-size:cover;background-position:center;opacity:0;transition:opacity .25s} .thumb .slide.on{opacity:1}
  .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f2f6,#e7eaf0)}
  .ph svg{width:52px;height:52px;color:#c2c9d6}
  .badge{position:absolute;top:12px;left:12px;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 9px;border-radius:6px;background:rgba(255,255,255,.95);box-shadow:0 1px 3px rgba(16,24,40,.14);z-index:2}
  .badge.veic{color:var(--brand-ink)} .badge.imov{color:var(--warnc)}
  .disc{position:absolute;bottom:12px;left:12px;font-size:12px;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--good);color:#fff;z-index:2}
  .fav{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;border:none;background:rgba(255,255,255,.95);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3;box-shadow:0 1px 3px rgba(16,24,40,.16);color:var(--muted)}
  .fav:hover{color:var(--ink)} .fav.on{color:#e11d48}
  .cn{position:absolute;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,.95);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(16,24,40,.2);z-index:2;color:var(--ink-2)}
  .cn.prev{left:10px}.cn.next{right:10px}
  .dots{position:absolute;bottom:10px;right:12px;display:flex;gap:4px;z-index:2}
  .dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.65)} .dots i.on{background:#fff;width:14px;border-radius:6px}
  .cbody{padding:14px 15px;display:flex;flex-direction:column;gap:9px;flex:1}
  .score{display:inline-flex;align-items:center;gap:7px;align-self:flex-start;font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;line-height:1.2}
  .score .sd{width:7px;height:7px;border-radius:50%}
  .score.alta{background:var(--good-soft);color:var(--good)} .score.alta .sd{background:var(--good)}
  .score.media{background:var(--warn-soft);color:var(--warnc)} .score.media .sd{background:#d99413}
  .score.baixa{background:var(--line-2);color:var(--muted)} .score.baixa .sd{background:var(--faint)}
  .ctitle{font-weight:600;font-size:15px;line-height:1.35;color:var(--ink);letter-spacing:-.01em;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;min-height:60px}
  .meta{display:flex;flex-direction:column;gap:5px;font-size:13px;color:var(--muted)}
  .meta .row{display:flex;align-items:center;gap:7px}
  .meta svg{width:15px;height:15px;color:var(--faint);flex-shrink:0}
  .tagline{display:flex;gap:8px;flex-wrap:wrap;margin-top:1px}
  .tag{font-size:11.5px;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line);border-radius:6px;padding:2px 8px}
  .motivo{font-size:12.5px;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:9px 11px;line-height:1.45}
  .motivo b{color:var(--ink);font-weight:600}
  .price{margin-top:auto;padding-top:4px}
  .price .aval{font-size:12px;color:var(--faint);text-decoration:line-through}
  .price .val{font-size:21px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
  .cfoot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line-2);padding:11px 15px;font-size:12.5px}
  .cfoot .house{font-weight:600;color:var(--ink-2)}
  .cfoot .rt{font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--good);border:1px solid #bfe3d0;background:var(--good-soft);padding:1px 6px;border-radius:5px;margin-left:6px;text-transform:uppercase}
  .cfoot .date{display:flex;align-items:center;gap:6px;color:var(--muted)} .cfoot .date svg{width:14px;height:14px;color:var(--faint)}
  .golink{display:block;margin:0 15px 15px;text-align:center;background:var(--brand);color:#fff;padding:10px;border-radius:var(--r-sm);font-weight:600;font-size:13.5px}
  .golink:hover{background:var(--brand-ink)}
  .golink.sample{background:var(--surface);color:var(--ink-2);border:1px solid var(--line)}
  .golink.sample:hover{border-color:var(--faint);background:var(--surface-2)}
  .empty{text-align:center;padding:72px 20px;color:var(--muted);font-size:15px}
  @media(max-width:640px){.nav{gap:14px;padding:0 16px}.tab span.txt{display:none}.wrap{padding:16px}}

  /* Oportunidades: controles + perfil */
  .oppctrl{padding:16px;margin-bottom:20px}
  .oppline{display:flex;gap:26px;flex-wrap:wrap;align-items:flex-end;margin-top:14px}
  .fld{display:flex;flex-direction:column;gap:7px}
  .seg2{border:1px solid var(--line);background:var(--surface);color:var(--muted);font-weight:600;font-size:13px;padding:6px 14px;border-radius:20px;cursor:pointer}
  .seg2.active{background:var(--brand);color:#fff;border-color:var(--brand)}
  .seg2.active[data-on="alta"]{background:var(--good);border-color:var(--good)}
  .seg2.active[data-on="media"]{background:var(--warnc);border-color:var(--warnc)}
  .seg2.active[data-on="baixa"]{background:var(--muted);border-color:var(--muted)}
  select.mini{border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px;font-size:14px;background:var(--surface);color:var(--ink);outline:none;min-width:150px}
  .prfrange{display:flex;gap:6px;align-items:center}
  .prfrange input{width:104px;border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px;font-size:14px;outline:none}
  .prfrange input:focus,select.mini:focus{border-color:var(--brand)}

  /* Barras de critério nos cards de oportunidade */
  .bk{display:flex;flex-direction:column;gap:6px;margin-top:2px}
  .bk .brow{display:flex;align-items:center;gap:9px;font-size:11.5px;color:var(--muted)}
  .bk .blab{width:70px;flex-shrink:0}
  .bk .btrack{flex:1;height:6px;background:var(--line-2);border-radius:4px;overflow:hidden}
  .bk .bfill{display:block;height:100%;border-radius:4px}

  /* Botões do card */
  .btns{display:flex;gap:8px;padding:0 15px 15px}
  .btns .golink{margin:0;flex:1}
  .anbtn{flex:0 0 auto;border:1px solid #c5d2fb;color:var(--brand-ink);background:var(--brand-soft);border-radius:var(--r-sm);font-weight:600;font-size:13.5px;padding:0 15px;cursor:pointer}
  .anbtn:hover{background:#e2e9fd}

  /* Modal de análise */
  .overlay{position:fixed;inset:0;background:rgba(16,24,40,.5);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:28px 16px;overflow:auto}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:16px;max-width:640px;width:100%;box-shadow:0 20px 60px rgba(16,24,40,.35)}
  .mhead{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .mhead h3{margin:0 0 4px;font-size:16px;letter-spacing:-.01em;line-height:1.35}
  .mhead .sub{font-size:12.5px;color:var(--muted)}
  .mclose{border:none;background:var(--surface-2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:20px;line-height:1;color:var(--muted);flex-shrink:0}
  .mbody{padding:20px;display:flex;flex-direction:column;gap:18px}
  .mscore{display:flex;align-items:center;gap:14px}
  .mscore .num{font-size:36px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .mscore .num.alta{color:var(--good)} .mscore .num.media{color:var(--warnc)} .mscore .num.baixa{color:var(--muted)}
  .msec h4{margin:0 0 9px;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
  .plist{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:7px}
  .plist li{display:flex;gap:9px;font-size:13.5px;line-height:1.45;color:var(--ink-2)}
  .plist li .mk{flex-shrink:0;font-weight:800}
  .plist.pos li .mk{color:var(--good)} .plist.att li .mk{color:var(--warnc)}
  .chk{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:11px}
  .chk li{display:flex;gap:11px;font-size:13.5px;line-height:1.45;color:var(--ink-2)}
  .chk .box{width:18px;height:18px;border:2px solid var(--line);border-radius:5px;flex-shrink:0;margin-top:1px}
  .chk b{color:var(--ink)}
  .aitease{background:var(--surface-2);border:1px dashed var(--line);border-radius:10px;padding:12px 14px;font-size:12.5px;color:var(--muted)}
  .aitease b{color:var(--ink-2)}
  .iabox{background:#f0f5ff;border:1px solid #d6e2ff;border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:10px;font-size:13.5px;color:var(--ink-2);line-height:1.5}
  .iabox p{margin:0}
  .iaresumo{font-weight:500;color:var(--ink)}
  .iagrid{display:flex;gap:24px;flex-wrap:wrap}
  .iagrid>div{display:flex;flex-direction:column;gap:2px}
  .ialbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:600}
  .iarisk{margin:4px 0 0;padding-left:18px}
  .iaverd{background:#fff;border:1px solid #d6e2ff;border-radius:8px;padding:9px 11px}
  .iafoot{font-size:11.5px;color:var(--muted);border-top:1px dashed #d6e2ff;padding-top:8px}
  .mfoot{padding:16px 20px;border-top:1px solid var(--line)}
  .mfoot .golink{margin:0;display:block;text-align:center}
</style>
</head>
<body>
<header>
  <div class="nav">
    <div class="brand">
      <span class="mark"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>
      BuscaLeilões
    </div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-view="buscar"><span class="txt">Buscar</span></button>
      <button class="tab" data-view="oportunidades"><span class="txt">Oportunidades</span></button>
      <button class="tab" data-view="favoritos"><span class="txt">Favoritos</span> <span class="cnt" id="favCnt">0</span></button>
      <button class="tab" data-view="vistos"><span class="txt">Vistos</span> <span class="cnt" id="visCnt">0</span></button>
    </div>
    <div class="status"><span class="dot"></span><span id="statusTxt">Acesso livre · links diretos</span></div>
  </div>
</header>

<div class="wrap">
  <div class="panel searchpanel" id="searchpanel">
    <div class="segrow">
      <button class="seg active" data-cat="todos">Todos</button>
      <button class="seg" data-cat="veiculo">Veículos</button>
      <button class="seg" data-cat="imovel">Imóveis</button>
    </div>
    <div class="searchbar">
      <div class="inp">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" type="text" placeholder="Buscar por modelo, marca ou cidade — ex.: Compass, apartamento São Paulo">
      </div>
      <button class="gobtn" id="goBtn">Buscar</button>
    </div>
    <div class="chiprow" id="chiprow"></div>
  </div>

  <div class="panel oppctrl" id="oppControls" style="display:none">
    <div class="segrow" id="oppCatRow">
      <button class="seg active" data-oc="todos">Todos</button>
      <button class="seg" data-oc="veiculo">Veículos</button>
      <button class="seg" data-oc="imovel">Imóveis</button>
    </div>
    <div class="oppline">
      <div class="fld"><span class="lbl">Nível de oportunidade</span>
        <div class="segrow" id="oppNivelRow">
          <button class="seg2 active" data-on="todas">Todas</button>
          <button class="seg2" data-on="alta">Alta</button>
          <button class="seg2" data-on="media">Média</button>
          <button class="seg2" data-on="baixa">Baixa</button>
        </div>
      </div>
      <div class="fld"><span class="lbl">Objetivo (perfil)</span>
        <select class="mini" id="oppObj">
          <option value="">Geral</option>
          <option value="uso">Uso próprio</option>
          <option value="revenda">Revenda</option>
          <option value="alavancagem">Alavancagem de capital</option>
          <option value="locacao">Locação</option>
        </select>
      </div>
      <div class="fld"><span class="lbl">Investimento (R$)</span>
        <div class="prfrange"><input id="oppMin" type="number" placeholder="mín"><span style="color:var(--faint)">—</span><input id="oppMax" type="number" placeholder="máx"></div>
      </div>
    </div>
  </div>

  <div class="notice" id="notice"></div>

  <div class="rhead">
    <div class="viewtitle" id="viewTitle">Resultados</div>
    <div class="count" id="countBox"><b id="cnt">0</b> lotes</div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none"></div>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script>
/* ===== Ícones (SVG) ===== */

/* ===== Índice de oportunidade (regras transparentes) ===== */
const MARCAS_LIQUIDAS=['Toyota','Honda','Volkswagen','Chevrolet','Hyundai','Jeep','Fiat','Yamaha'];
function scoreOportunidade(l){
  let nota=48; const motivos=[];
  const d=l.avaliacao?Math.round((1-l.preco/l.avaliacao)*100):null;
  if(d!==null){
    if(d>=45){nota+=30;motivos.push(`desconto muito alto (${d}% abaixo da avaliação)`);}
    else if(d>=30){nota+=20;motivos.push(`ótimo desconto (${d}%)`);}
    else if(d>=15){nota+=11;motivos.push(`bom desconto (${d}%)`);}
    else if(d>0){nota+=4;motivos.push(`desconto de ${d}%`);}
    else{motivos.push('sem desconto relevante');}
  } else {motivos.push('sem avaliação para comparar (checar FIPE/mercado)');}
  if(l.cat==='veiculo'&&MARCAS_LIQUIDAS.includes(l.marca)){nota+=8;motivos.push('marca de fácil revenda');}
  if(l.modalidade==='Judicial'){nota-=7;motivos.push('leilão judicial — ler o edital com atenção (ocupação/ônus)');}
  else if(l.modalidade==='Venda Direta'){nota+=5;motivos.push('venda direta — processo mais simples');}
  nota=Math.max(3,Math.min(99,Math.round(nota)));
  const faixa=nota>=72?'alta':nota>=55?'media':'baixa';
  const rotulo=nota>=72?'Oportunidade alta':nota>=55?'Oportunidade média':'Avaliar com cautela';
  return {nota,faixa,rotulo,motivo:motivos.join(' · ')};
}

  chk.push(['Edital','Leia o edital inteiro antes de dar qualquer lance — ele define regras, prazos e responsabilidades.']);
  const sc=scoreOportunidade(l);
  return {nota:sc.nota,faixa:sc.faixa,rotulo:sc.rotulo,bk:breakdown(l),pos,att,chk};
}
function openAnalise(l){
  const a=analisarLote(l);
  document.getElementById('modal').innerHTML=`
    <div class="mhead"><div><h3>${l.titulo}</h3><div class="sub">${l.cidade}/${l.uf} · ${l.tipo} · ${l.fonte}</div></div><button class="mclose" id="mclose" aria-label="Fechar">×</button></div>
    <div class="mbody">
      <div class="mscore"><div class="num ${a.faixa}">${a.nota}</div><div><div style="font-weight:700">${a.rotulo}</div><div style="font-size:12.5px;color:var(--muted)">Nota geral de oportunidade (0–100)</div></div></div>
      <div class="bk">${barRow('Desconto',a.bk.desconto)}${barRow('Segurança',a.bk.seguranca)}${barRow('Liquidez',a.bk.liquidez)}</div>
      ${a.pos.length?`<div class="msec"><h4>Sinais positivos</h4><ul class="plist pos">${a.pos.map(t=>`<li><span class="mk">✓</span><span>${t}</span></li>`).join('')}</ul></div>`:''}
      ${a.att.length?`<div class="msec"><h4>Pontos de atenção</h4><ul class="plist att">${a.att.map(t=>`<li><span class="mk">!</span><span>${t}</span></li>`).join('')}</ul></div>`:''}
      <div class="msec"><h4>Verifique antes de dar lance</h4><ul class="chk">${a.chk.map(c=>`<li><span class="box"></span><span><b>${c[0]}.</b> ${c[1]}</span></li>`).join('')}</ul></div>
      ${l.ia ? `<div class="msec"><h4>Análise por IA do edital</h4>
        <div class="iabox">
          <p class="iaresumo">${l.ia.resumo||''}</p>
          <div class="iagrid">
            <div><span class="ialbl">Ocupação</span><b>${l.ia.ocupacao||'—'}</b></div>
            <div><span class="ialbl">Financiamento / FGTS</span><b>${l.ia.financiamento||'—'}</b></div>
          </div>
          ${l.ia.dividas?`<p><b>Dívidas / ônus:</b> ${l.ia.dividas}</p>`:''}
          ${(l.ia.riscos&&l.ia.riscos.length)?`<div><b>Riscos:</b><ul class="iarisk">${l.ia.riscos.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:''}
          ${l.ia.veredito?`<p class="iaverd"><b>Veredito:</b> ${l.ia.veredito}</p>`:''}
          <div class="iafoot">Gerado por IA a partir da página oficial — confira sempre o edital antes de dar lance.</div>
        </div></div>`
      : `<div class="aitease"><b>Análise por IA do edital:</b> assim que a chave gratuita do Gemini for adicionada, os melhores lotes ganham aqui uma leitura automática do edital (ocupação, dívidas, riscos e veredito). Este lote ainda não foi analisado.</div>`}
    </div>
    <div class="mfoot"><a class="golink" href="${l.url}" target="_blank" rel="noopener">Ver leilão / edital na fonte</a></div>`;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('mclose').onclick=closeAnalise;
}
function closeAnalise(){document.getElementById('overlay').classList.remove('open');}

/* ===== Render ===== */
function baseList(){
  if(state.view==='favoritos')return LOTES.filter(l=>FAV.has(l.id));
  if(state.view==='vistos')return VIS.map(id=>LOTES.find(l=>l.id===id)).filter(Boolean);
  if(state.view==='oportunidades'){
    let l=LOTES.slice();
    if(OPP.cat!=='todos')l=l.filter(x=>x.cat===OPP.cat);
    if(OPP.pmin!=='')l=l.filter(x=>x.preco>=+OPP.pmin);
    if(OPP.pmax!=='')l=l.filter(x=>x.preco<=+OPP.pmax);
    if(OPP.nivel!=='todas')l=l.filter(x=>scoreOportunidade(x).faixa===OPP.nivel);
    l.sort((a,b)=>profileNota(b)-profileNota(a));
    return l;
  }
  let list=LOTES.slice();
  if(state.cat!=='todos')list=list.filter(l=>l.cat===state.cat);
  const f=state.filtros;
  if(f.tipo.size)list=list.filter(l=>f.tipo.has(l.tipo));
  if(f.marca.size)list=list.filter(l=>f.marca.has(l.marca));
  if(f.uf.size)list=list.filter(l=>f.uf.has(l.uf));
  if(f.cidade.size)list=list.filter(l=>f.cidade.has(l.cidade));
  if(f.fonte.size)list=list.filter(l=>f.fonte.has(l.fonte));
  if(f.modalidade.size)list=list.filter(l=>f.modalidade.has(l.modalidade));
  if(state.pmin!=='')list=list.filter(l=>l.preco>=+state.pmin);
  if(state.pmax!=='')list=list.filter(l=>l.preco<=+state.pmax);
  if(state.q){const q=state.q.toLowerCase();list=list.filter(l=>(l.titulo+' '+(l.marca||'')+' '+l.cidade+' '+l.uf+' '+l.tipo+' '+l.fonte).toLowerCase().includes(q));}
  if(state.sort==='data')list.sort((a,b)=>(a.dataLeilao||'').localeCompare(b.dataLeilao||''));
  if(state.sort==='preco-asc')list.sort((a,b)=>a.preco-b.preco);
  if(state.sort==='preco-desc')list.sort((a,b)=>b.preco-a.preco);
  if(state.sort==='desconto')list.sort((a,b)=>desc(b)-desc(a));
  if(state.sort==='score')list.sort((a,b)=>scoreOportunidade(b).nota-scoreOportunidade(a).nota);
  return list;
}
function setNotice(){
  const n=document.getElementById('notice');
  if(state.view==='oportunidades'){
    n.className='notice warn';n.style.display='flex';
    n.innerHTML=`<span class="ic">${I.info}</span><div><b>Ranking por índice de oportunidade.</b> A nota (0–100) é calculada por regras transparentes: desconto sobre a avaliação, liquidez da marca e risco da modalidade. É apoio à decisão, não recomendação de investimento — leia sempre o edital antes de dar lance. Análise de IA do edital nos melhores lotes está no roadmap.</div>`;
  } else if(state.view==='buscar'){
    n.className='notice';n.style.display='flex';
    if(FONTE_DADOS==='amostra'){
      n.innerHTML=`<span class="ic">${I.info}</span><div><b>Pré-visualização com dados de amostra.</b> As imagens são ilustrativas e alguns links apontam para a página inicial da fonte. Ao conectar a base da Caixa, os imóveis reais entram automaticamente aqui, cada um com link direto.</div>`;
    } else {
      n.innerHTML=`<span class="ic">${I.info}</span><div><b>Dados reais carregados.</b> ${LOTES.length} lotes de: ${[...new Set(LOTES.map(l=>l.fonte))].join(', ')}.</div>`;
    }
  } else {n.style.display='none';}
}
let LIMITE=60;
function render(resetLimite=true){
  if(resetLimite)LIMITE=60;
  document.getElementById('favCnt').textContent=FAV.size;
  document.getElementById('visCnt').textContent=VIS.length;
  document.getElementById('searchpanel').style.display=(state.view==='buscar')?'':'none';
  document.getElementById('oppControls').style.display=(state.view==='oportunidades')?'':'none';
  document.getElementById('viewTitle').textContent=
    state.view==='favoritos'?'Favoritos':state.view==='vistos'?'Vistos recentemente':state.view==='oportunidades'?'Melhores oportunidades':'Resultados';
  setNotice();
  const list=baseList();
  document.getElementById('countBox').innerHTML=`<b>${list.length.toLocaleString('pt-BR')}</b> de ${LOTES.length.toLocaleString('pt-BR')} lotes`;
  const grid=document.getElementById('grid'),empty=document.getElementById('empty');grid.innerHTML='';
  const _mw=document.getElementById('moreWrap');if(_mw)_mw.style.display='none';
  if(!list.length){empty.style.display='block';
    empty.textContent=state.view==='favoritos'?'Você ainda não salvou nenhum lote. Use o ícone de coração nos cards.':state.view==='vistos'?'Você ainda não abriu nenhum lote.':'Nenhum lote encontrado com esses filtros.';return;}
  empty.style.display='none';
  const mostrarMotivo=(state.view==='oportunidades');
  list.slice(0,LIMITE).forEach(l=>{
    const d=desc(l),fotos=fotosDe(l),fav=FAV.has(l.id),sc=scoreOportunidade(l),bk=breakdown(l);
    const card=document.createElement('div');card.className='card';
    const mediaInner = `<div class="ph">${phIcon(l)}</div>`
      + fotos.map((u,k)=>`<img class="slide ${k===0?'on':''}" src="${u}" loading="lazy" onerror="this.style.display='none'">`).join('')
      + (fotos.length>1?`<button class="cn prev" type="button">${I.arrowL}</button><button class="cn next" type="button">${I.arrowR}</button><div class="dots">${fotos.map((_,k)=>`<i class="${k===0?'on':''}"></i>`).join('')}</div>`:'');
    card.innerHTML=`
      <div class="thumb" data-idx="0">
        ${mediaInner}
        <button class="fav ${fav?'on':''}" aria-label="Favoritar">${fav?I.heartFill:I.heart}</button>
        <span class="badge ${l.cat==='veiculo'?'veic':'imov'}">${l.cat==='veiculo'?'Veículo':'Imóvel'}</span>
        ${d>0?`<span class="disc">-${d}%</span>`:''}
      </div>
      <div class="cbody">
        <span class="score ${sc.faixa}"><span class="sd"></span>${sc.nota} · ${sc.rotulo}</span>
        <div class="ctitle">${l.titulo}</div>
        <div class="meta">
          <div class="row">${I.pin}<span>${l.cidade}/${l.uf}</span></div>
        </div>
        <div class="tagline"><span class="tag">${l.tipo}${l.ano?' · '+l.ano:''}</span><span class="tag">${l.modalidade}</span></div>
        ${mostrarMotivo?`<div class="bk">${barRow('Desconto',bk.desconto)}${barRow('Segurança',bk.seguranca)}${barRow('Liquidez',bk.liquidez)}</div>`:''}
        <div class="price">${l.avaliacao?`<div class="aval">Avaliação ${fmt(l.avaliacao)}</div>`:''}<div class="val">${fmt(l.preco)}</div></div>
      </div>
      <div class="btns"><a class="golink ${l.real?'':'sample'}" href="${l.url}" target="_blank" rel="noopener">${l.real?'Ver leilão na fonte':'Ver na fonte'}</a><button class="anbtn" type="button">Analisar</button></div>
      <div class="cfoot"><span class="house">${l.fonte}${l.real?'<span class="rt">Real</span>':''}</span><span class="date">${I.cal}${dtBR(l.dataLeilao)}</span></div>`;
    grid.appendChild(card);
    if(fotos.length>1){
      const media=card.querySelector('.thumb');const slides=[...media.querySelectorAll('.slide')],dots=[...media.querySelectorAll('.dots i')];
      const go=n=>{let i=(n+slides.length)%slides.length;media.dataset.idx=i;slides.forEach((s,k)=>s.classList.toggle('on',k===i));dots.forEach((dd,k)=>dd.classList.toggle('on',k===i));};
      media.querySelector('.prev').onclick=e=>{e.stopPropagation();go(+media.dataset.idx-1);};
      media.querySelector('.next').onclick=e=>{e.stopPropagation();go(+media.dataset.idx+1);};
    }
    card.querySelector('.fav').onclick=e=>{e.stopPropagation();if(FAV.has(l.id))FAV.delete(l.id);else FAV.add(l.id);render();};
    card.querySelector('.golink').addEventListener('click',()=>{const idx=VIS.indexOf(l.id);if(idx>-1)VIS.splice(idx,1);VIS.unshift(l.id);document.getElementById('visCnt').textContent=VIS.length;});
    card.querySelector('.anbtn').onclick=e=>{e.stopPropagation();openAnalise(l);};
  });
  let mw=document.getElementById('moreWrap');
  if(!mw){mw=document.createElement('div');mw.id='moreWrap';mw.style.cssText='text-align:center;margin-top:22px';mw.innerHTML='<button id="moreBtn" class="gobtn"></button>';grid.after(mw);document.getElementById('moreBtn').onclick=()=>{LIMITE+=60;render(false);};}
  if(list.length>LIMITE){mw.style.display='block';document.getElementById('moreBtn').textContent=`Carregar mais — mostrando ${Math.min(LIMITE,list.length)} de ${list.length.toLocaleString('pt-BR')}`;}
  else mw.style.display='none';
}

/* ===== Eventos ===== */
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');state.view=t.dataset.view;render();});
document.querySelectorAll('#searchpanel .seg').forEach(s=>s.onclick=()=>{document.querySelectorAll('#searchpanel .seg').forEach(x=>x.classList.remove('active'));s.classList.add('active');state.cat=s.dataset.cat;Object.values(state.filtros).forEach(set=>set.clear());buildChips();render();});
document.getElementById('q').oninput=e=>{state.q=e.target.value;if(state.view==='buscar')render();};
document.getElementById('goBtn').onclick=()=>{state.view='buscar';document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.view==='buscar'));render();};

/* Controles da aba Oportunidades */
document.querySelectorAll('#oppCatRow .seg').forEach(s=>s.onclick=()=>{document.querySelectorAll('#oppCatRow .seg').forEach(x=>x.classList.remove('active'));s.classList.add('active');OPP.cat=s.dataset.oc;render();});
document.querySelectorAll('#oppNivelRow .seg2').forEach(s=>s.onclick=()=>{document.querySelectorAll('#oppNivelRow .seg2').forEach(x=>x.classList.remove('active'));s.classList.add('active');OPP.nivel=s.dataset.on;render();});
document.getElementById('oppObj').onchange=e=>{OPP.obj=e.target.value;render();};
document.getElementById('oppMin').oninput=e=>{OPP.pmin=e.target.value;render();};
document.getElementById('oppMax').oninput=e=>{OPP.pmax=e.target.value;render();};
document.getElementById('overlay').onclick=e=>{if(e.target.id==='overlay')closeAnalise();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeAnalise();});

/* ===== Carregar dados reais (dados.json) ===== */
function initIds(){LOTES.forEach((l,i)=>l.id=i);}
async function carregarDados(){
  try{
    const r=await fetch('dados.json',{cache:'no-store'});
    if(r.ok){const data=await r.json();
      if(data&&Array.isArray(data.lotes)&&data.lotes.length){
        LOTES=data.lotes;FONTE_DADOS='real';
        document.getElementById('statusTxt').textContent=`${LOTES.length} lotes reais · ${data.atualizadoEm||''}`;
      }}
  }catch(e){}
  initIds();buildChips();render();
}
initIds();buildChips();render();
carregarDados();
</script>

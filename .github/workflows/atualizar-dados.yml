name: Atualizar dados de leiloes

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositorio
        uses: actions/checkout@v4

      - name: Preparar o Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Rodar o coletor da Caixa
        run: python coletor_caixa.py

      - name: Publicar o dados.json atualizado
        run: |
          git config user.name "bot-leiloes"
          git config user.email "bot@users.noreply.github.com"
          git add dados.json
          git commit -m "Atualiza dados" || echo "Nada mudou hoje"
          git push
